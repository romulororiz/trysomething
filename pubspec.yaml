name: trysomething
description: "TrySomething — Hobby discovery app that helps you actually start."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Networking & Images
  cached_network_image: ^3.4.1
  dio: ^5.7.0

  # Local persistence
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Icons
  material_design_icons_flutter: ^7.0.7296
  phosphor_flutter: ^2.1.0

  # Auth
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2

  # Media
  image_picker: ^1.1.2

  # Sharing
  share_plus: ^10.1.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
