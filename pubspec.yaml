name: trysomething
description: "TrySomething — Hobby discovery app that helps you actually start."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  sentry_flutter: ^9.14.0
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Timeline UI
  timelines_plus: ^1.0.0

  # Networking & Images
  cached_network_image: ^3.4.1
  dio: ^5.7.0

  # Local persistence
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  phosphor_flutter: ^2.1.0

  # Auth
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Media
  image_picker: ^1.1.2

  # Sharing
  share_plus: ^10.1.4
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Analytics
  posthog_flutter: ^4.0.0

  # Subscriptions
  purchases_flutter: ^9.14.0

  # Screen wakelock (session timer)
  wakelock_plus: ^1.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.19.0
  url_launcher: ^6.3.2
  purchases_ui_flutter: ^9.14.0
  flutter_svg: ^2.2.4
  audioplayers: ^6.6.0
  speech_to_text: ^7.3.0

dev_dependencies:
  sentry_dart_plugin: ^3.2.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.2
  flutter_launcher_icons: ^0.14.3
  fake_async: ^1.3.1
  golden_toolkit: ^0.15.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
    - assets/fonts/
    - assets/textures/
    - assets/audio/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: try-something
  org: trysomething-lz
